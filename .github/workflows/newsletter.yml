name: Daily Newsletter

on:
  schedule:
    # Runs at 07:00 UTC every day (8am Nigeria / WAT, 3am ET)
    - cron: '0 7 * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily newsletter
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/send-newsletter")
          cat /tmp/response.json
          if [ "$response" -ne 200 ]; then
            echo "Newsletter failed with HTTP $response"
            exit 1
          fi
